name: Submit App Store Review

on:
  workflow_dispatch:
    inputs:
      expected_build_number:
        description: "Build number to submit"
        required: false
        type: string
      force_resubmit:
        description: "Cancel current review submission and submit again"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      max_build_wait_attempts:
        description: "Build wait attempts, 30 seconds each"
        required: false
        default: "90"
        type: string

jobs:
  submit:
    runs-on: macos-latest
    timeout-minutes: 75

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install pyjwt cryptography requests

      - name: Set up ASC API Key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          echo "$ASC_API_KEY_CONTENT" | base64 -D > /tmp/asc_key.p8

      - name: Submit for review
        env:
          ASC_P8_PATH: /tmp/asc_key.p8
          APP_BUNDLE_ID: com.tokyonasu.miiyaShop
          APP_VERSION: "1.0"
          EXPECTED_BUILD_NUMBER: ${{ inputs.expected_build_number }}
          FORCE_RESUBMIT: ${{ inputs.force_resubmit }}
          MAX_BUILD_WAIT_ATTEMPTS: ${{ inputs.max_build_wait_attempts }}
        run: python scripts/submit_review.py
